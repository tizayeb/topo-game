<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>TopoTrainer.nl - Learning Engine</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        body { font-family: 'Inter', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-effect {
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              colors: {
                "on-tertiary-fixed": "#00210c",
                "inverse-primary": "#92ccff",
                "surface-container": "#e3efff",
                "surface-variant": "#d1e4fb",
                "outline": "#707881",
                "on-primary": "#ffffff",
                "background": "#f7f9ff",
                "primary-fixed-dim": "#92ccff",
                "on-tertiary": "#ffffff",
                "error-container": "#ffdad6",
                "secondary": "#4e6073",
                "surface-bright": "#f7f9ff",
                "on-error": "#ffffff",
                "on-surface": "#091d2e",
                "surface-container-lowest": "#ffffff",
                "surface-dim": "#c9dcf3",
                "on-error-container": "#93000a",
                "tertiary-fixed": "#7efba4",
                "on-background": "#091d2e",
                "on-surface-variant": "#3f4850",
                "error": "#ba1a1a",
                "on-secondary-fixed-variant": "#36485b",
                "secondary-fixed": "#d1e4fb",
                "primary-container": "#3498db",
                "surface-container-high": "#d9eaff",
                "inverse-on-surface": "#e8f2ff",
                "on-tertiary-container": "#003115",
                "secondary-fixed-dim": "#b5c8df",
                "tertiary-container": "#19a659",
                "tertiary-fixed-dim": "#61de8a",
                "surface": "#f7f9ff",
                "on-secondary-container": "#526478",
                "secondary-container": "#cfe2f9",
                "on-primary-container": "#002d47",
                "outline-variant": "#bfc7d2",
                "inverse-surface": "#203243",
                "on-primary-fixed-variant": "#004b73",
                "primary": "#006397",
                "surface-tint": "#006397",
                "surface-container-highest": "#d1e4fb",
                "on-secondary-fixed": "#091d2e",
                "tertiary": "#006d37",
                "primary-fixed": "#cce5ff",
                "on-secondary": "#ffffff",
                "surface-container-low": "#edf4ff",
                "on-tertiary-fixed-variant": "#005228",
                "on-primary-fixed": "#001d31"
              },
              fontFamily: {
                "headline": ["Inter"],
                "body": ["Inter"],
                "label": ["Inter"]
              },
              borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
            },
          },
        }
      </script>
</head>
<body class="bg-surface text-on-surface min-h-screen flex flex-col">
<!-- TopAppBar - JSON Source -->
<header class="fixed top-0 w-full z-50 bg-white/80 dark:bg-slate-900/80 backdrop-blur-md shadow-[0px_20px_40px_rgba(9,29,46,0.06)] flex justify-between items-center px-6 py-3">
<div class="flex items-center gap-4">
<button class="p-2 hover:bg-slate-100/50 dark:hover:bg-slate-800/50 transition-colors active:scale-95 duration-200 rounded-full">
<span class="material-symbols-outlined text-on-surface-variant">menu</span>
</button>
<span class="text-xl font-black tracking-tighter text-blue-900 dark:text-blue-100">TopoTrainer.nl</span>
</div>
<div class="flex items-center gap-2">
<span class="text-blue-700 dark:text-blue-400 font-bold px-4 py-1 rounded-full bg-blue-50 dark:bg-blue-900/20 text-sm">LEVEL 04: CITIES</span>
<button class="p-2 hover:bg-slate-100/50 dark:hover:bg-slate-800/50 transition-colors active:scale-95 duration-200 rounded-full">
<span class="material-symbols-outlined text-on-surface-variant">language</span>
</button>
</div>
<div class="absolute bottom-0 left-0 bg-slate-100 dark:bg-slate-800 h-px w-full"></div>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow pt-24 pb-32 px-4 md:px-8 max-w-[1600px] mx-auto w-full">
<!-- Question Header -->
<section class="mb-8 md:ml-4">
<div class="inline-block px-3 py-1 mb-4 bg-primary-fixed text-on-primary-fixed rounded-lg font-bold text-[10px] tracking-widest uppercase">
                ID Mode
            </div>
<h1 class="text-4xl md:text-5xl font-black text-on-surface tracking-tighter mb-2">
                Find: <span class="text-primary">Amsterdam</span>
</h1>
<p class="text-on-surface-variant font-medium">Select the correct location from the options below.</p>
</section>
<div class="grid grid-cols-1 lg:grid-cols-12 gap-8 items-start">
<!-- Map Insight Card (Now 75% width on large screens) -->
<div class="lg:col-span-8 relative group">
<div class="absolute inset-0 bg-gradient-to-br from-primary to-primary-container rounded-3xl rotate-1 group-hover:rotate-0 transition-transform duration-500 opacity-10"></div>
<div class="relative bg-surface-container-lowest p-4 rounded-3xl shadow-[0px_20px_40px_rgba(9,29,46,0.06)] overflow-hidden">
<img alt="Detailed topographical map of the Netherlands focusing on North Holland region" class="w-full h-[500px] object-cover rounded-2xl" data-alt="Stylized high-contrast topographical map of the Netherlands with soft blue and white terrain highlights and glowing city markers" data-location="Netherlands" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDZAHd7A0nM4alVsPn5mNNPyhH0Hb-3EY9P8nlmCMjrR03DdQnxfxKdsqWycRJAXyde_sbaUOET4naASeyR72k7uSzywTpilASPrYWFG3MA2DjvpV7BLUMjWkWTGWBDHEqeCfXkP1JX2nncCX0S3ZvRLmN2OKHOHNyjM7VvevvPzn-gUg5rjfJLqbXmV7JoRrHzA9vebGHqAzJI3_FxzAhWDFzjzn_K2XGx_Ccc2uzjY7OzLB685LXhYIUTS4IxMxDhK9BZWcqRc5o"/>
<!-- Glassmorphic Map Overlay -->
<div class="absolute bottom-8 right-8 glass-effect bg-surface-container-lowest/80 p-4 rounded-2xl shadow-xl border border-white/20">
<div class="flex items-center gap-3">
<div class="w-10 h-10 bg-primary-container/20 rounded-full flex items-center justify-center">
<span class="material-symbols-outlined text-primary" style="font-variation-settings: 'FILL' 1;">explore</span>
</div>
<div>
<p class="text-[10px] font-bold text-on-surface-variant uppercase tracking-widest">Target Region</p>
<p class="font-bold text-on-surface">North Holland</p>
</div>
</div>
</div>
</div>
</div>
<!-- Interaction Column (Now 25% width on large screens) -->
<div class="lg:col-span-4 flex flex-col gap-6">
<!-- Instruction Card -->
<div class="bg-surface-container-low p-6 rounded-3xl">
<div class="flex items-center gap-4 mb-6">
<div class="h-10 w-1 bg-primary rounded-full"></div>
<h3 class="text-xl font-bold tracking-tight">Select Location</h3>
</div>
<!-- Multiple Choice Grid -->
<div class="grid grid-cols-1 gap-3">
<button class="flex items-center justify-between p-4 bg-surface-container-lowest border-2 border-transparent hover:border-primary-container hover:bg-blue-50 transition-all duration-300 group rounded-2xl">
<span class="font-bold text-on-surface text-lg">Rotterdam</span>
<span class="w-6 h-6 rounded-full border-2 border-outline-variant group-hover:border-primary transition-colors"></span>
</button>
<!-- Active/Selected State -->
<button class="flex items-center justify-between p-4 bg-blue-50 border-2 border-primary transition-all duration-300 group rounded-2xl">
<span class="font-bold text-primary text-lg">Amsterdam</span>
<span class="w-6 h-6 rounded-full bg-primary flex items-center justify-center">
<span class="material-symbols-outlined text-white text-sm" style="font-variation-settings: 'wght' 700;">check</span>
</span>
</button>
<button class="flex items-center justify-between p-4 bg-surface-container-lowest border-2 border-transparent hover:border-primary-container hover:bg-blue-50 transition-all duration-300 group rounded-2xl">
<span class="font-bold text-on-surface text-lg">Utrecht</span>
<span class="w-6 h-6 rounded-full border-2 border-outline-variant group-hover:border-primary transition-colors"></span>
</button>
<button class="flex items-center justify-between p-4 bg-surface-container-lowest border-2 border-transparent hover:border-primary-container hover:bg-blue-50 transition-all duration-300 group rounded-2xl">
<span class="font-bold text-on-surface text-lg">The Hague</span>
<span class="w-6 h-6 rounded-full border-2 border-outline-variant group-hover:border-primary transition-colors"></span>
</button>
<button class="flex items-center justify-between p-4 bg-surface-container-lowest border-2 border-transparent hover:border-primary-container hover:bg-blue-50 transition-all duration-300 group rounded-2xl">
<span class="font-bold text-on-surface text-lg">Eindhoven</span>
<span class="w-6 h-6 rounded-full border-2 border-outline-variant group-hover:border-primary transition-colors"></span>
</button>
</div>
<!-- Submit Action -->
<button class="w-full mt-6 py-5 bg-gradient-to-r from-primary to-primary-container text-white font-black text-lg tracking-widest uppercase rounded-xl shadow-lg shadow-primary/20 hover:scale-[1.02] active:scale-95 transition-all">
                        Confirm Selection
                    </button>
</div>
</div>
</div>
</main>
<!-- BottomNavBar - Scoreboard Content (JSON Source) -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center pt-3 pb-6 px-4 bg-white dark:bg-slate-900 shadow-[0_-10px_30px_rgba(0,0,0,0.05)] border-t border-slate-100 dark:border-slate-800">
<!-- Score -->
<div class="flex flex-col items-center text-blue-600 dark:text-blue-400 scale-110 transition-transform">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">stars</span>
<span class="text-[10px] font-bold uppercase tracking-widest mt-1">Score</span>
<span class="font-black text-xs">1,240</span>
</div>
<!-- Wrong -->
<div class="flex flex-col items-center text-slate-400 dark:text-slate-500 hover:opacity-80">
<span class="material-symbols-outlined">cancel</span>
<span class="text-[10px] font-bold uppercase tracking-widest mt-1">Wrong</span>
<span class="font-black text-xs">2</span>
</div>
<!-- Progress Track (Specialized EdTech Component) -->
<div class="hidden md:flex flex-col items-center w-48">
<div class="w-full h-1.5 bg-surface-variant rounded-full overflow-hidden mb-2">
<div class="h-full bg-tertiary-fixed w-3/5"></div>
</div>
<span class="text-[8px] font-bold text-on-surface-variant uppercase tracking-tighter">Session Progress: 12/20</span>
</div>
<!-- Lives -->
<div class="flex flex-col items-center text-slate-400 dark:text-slate-500 hover:opacity-80">
<span class="material-symbols-outlined text-red-500" style="font-variation-settings: 'FILL' 1;">favorite</span>
<span class="text-[10px] font-bold uppercase tracking-widest mt-1">Lives</span>
<span class="font-black text-xs text-red-500">3/3</span>
</div>
<!-- Streak -->
<div class="flex flex-col items-center text-slate-400 dark:text-slate-500 hover:opacity-80">
<span class="material-symbols-outlined text-orange-500" style="font-variation-settings: 'FILL' 1;">local_fire_department</span>
<span class="text-[10px] font-bold uppercase tracking-widest mt-1">Streak</span>
<span class="font-black text-xs text-orange-500">8</span>
</div>
</nav>
<!-- SideNav Hover Trigger (Visual Cue Only) -->
<div class="hidden lg:flex fixed left-0 top-0 h-full w-2 items-center z-40">
<div class="h-32 w-1 bg-blue-100 dark:bg-slate-800 rounded-r-full"></div>
</div>
</body></html>
